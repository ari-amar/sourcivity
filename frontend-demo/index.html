<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>window.DEMO_MODE = true;</script>
  <title>Sourcivity — Demo</title>
  <link rel="icon" type="image/png" href="sourcivity-logo.png">
  <link rel="apple-touch-icon" href="sourcivity-logo.png">
  <meta property="og:title" content="Sourcivity Demo">
  <meta property="og:description" content="AI-powered supplier search and procurement — try it live">
  <meta property="og:image" content="sourcivity-logo.png">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css?v=117">
  <style>
    /* Demo-only: banner + CTA popup (everything else lives in style.css) */
    .demo-banner {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 18px;
      margin: 0 auto 20px auto;
      max-width: 900px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .demo-banner a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .demo-banner a:hover { text-decoration: underline; }
    .demo-badge {
      background: var(--warning);
      color: var(--bg);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    @media (max-width: 768px) {
      .demo-banner {
        flex-direction: column;
        text-align: center;
        font-size: 12px;
        padding: 10px 14px;
        gap: 6px;
      }
      .demo-cta-box { padding: 24px 20px; margin: 0 12px; }
      .demo-cta-box h3 { font-size: 16px; }
      .demo-cta-box p { font-size: 13px; }
    }
    .demo-cta-popup {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .demo-cta-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 40px;
      max-width: 440px;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
    .demo-cta-box h3 {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 12px;
      font-weight: 700;
    }
    .demo-cta-box p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .demo-cta-box a.cta-link {
      display: inline-block;
      padding: 10px 24px;
      background: var(--primary);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 10px;
      box-shadow: 0 2px 12px rgba(72, 136, 255, 0.25);
    }
    .demo-cta-box a.cta-link:hover { background: #5997ff; }
    .demo-cta-box .cta-dismiss {
      display: block;
      margin-top: 8px;
      color: var(--dim);
      font-size: 13px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
    }
    .demo-cta-box .cta-dismiss:hover { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <div class="logo-group">
      <img src="sourcivity-logo.png" alt="Sourcivity" class="header-logo">
      <h1>Sourcivity</h1>
    </div>
    <nav>
      <button class="nav-btn active" data-tab="search">Supplier Search</button>
      <button class="nav-btn" data-tab="quotes">Quote Tracker</button>
    </nav>
    <div class="header-right">
      <button type="button" class="header-action" id="new-search-btn">+ New Search</button>
    </div>
  </header>

  <main>
    <div class="demo-banner">
      <span><span class="demo-badge">Demo</span> &nbsp; 5 searches per hour &bull; Search results only &bull; RFQ sending disabled</span>
      <a href="mailto:ari@sourcivity.io">Get full access &rarr;</a>
    </div>

    <!-- SUPPLIER SEARCH TAB -->
    <section id="tab-search" class="tab active">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search for a supplier or service...">
        <button id="search-btn">Search</button>
      </div>
      <div id="suggestions" class="suggestions">
        <div id="suggestion-chips" class="suggestion-chips"></div>
        <div class="region-toggle" id="region-toggle">
          <span class="region-emoji" id="region-emoji-na">🇺🇸</span>
          <input type="checkbox" id="region-switch-input" class="region-input">
          <label for="region-switch-input" class="region-track">
            <span class="region-knob"></span>
          </label>
          <span class="region-emoji" id="region-emoji-global">🌍</span>
        </div>
      </div>
      <div id="search-status" class="status-msg hidden"></div>
      <div id="search-results" class="results-container">
        <div id="results-meta" class="results-meta hidden">
          <span class="results-meta-count" id="results-meta-count"></span>
        </div>
        <div id="results-grid" class="supplier-cards-grid hidden"></div>
      </div>
    </section>

    <!-- QUOTE TRACKER TAB -->
    <section id="tab-quotes" class="tab hidden">
      <div class="tracker-header">
        <h2>Quote Tracker</h2>
        <div class="tracker-controls">
          <div class="status-filters" id="status-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="sent">Sent</button>
            <button class="filter-btn" data-filter="responded">Responded</button>
            <button class="filter-btn" data-filter="overdue">Overdue</button>
            <button class="filter-btn" data-filter="received">Received</button>
            <button class="filter-btn" data-filter="bounced">Bounced</button>
          </div>
          <button id="refresh-quotes-btn">Refresh</button>
        </div>
      </div>
      <div id="quotes-status" class="status-msg hidden"></div>
      <table id="quotes-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Supplier</th>
            <th>Part / Service</th>
            <th>Quoted Price</th>
            <th>Unit</th>
            <th>Lead Time</th>
            <th>MOQ</th>
            <th>Payment Terms</th>
            <th>Valid Until</th>
            <th>Status</th>
            <th>Latest</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="quotes-body"></tbody>
      </table>
    </section>

    <!-- FLOATING RFQ CART -->
    <div id="rfq-cart-float" class="rfq-cart-float hidden">
      <button type="button" id="rfq-cart-pill" class="rfq-cart-pill" aria-label="Open RFQ cart">
        <span class="rfq-cart-pill-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
          <span id="rfq-cart-pill-count" class="rfq-cart-pill-count">0</span>
        </span>
        <span>RFQ Cart</span>
      </button>
      <div id="rfq-cart-panel" class="rfq-cart-panel hidden" role="dialog" aria-label="RFQ Cart">
        <div class="rfq-cart-header">
          <div class="rfq-cart-header-info">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            <div>
              <div class="rfq-cart-header-title">RFQ Cart</div>
              <div class="rfq-cart-header-sub" id="rfq-cart-header-sub">0 items</div>
            </div>
          </div>
          <button type="button" id="rfq-cart-collapse" class="rfq-cart-collapse" aria-label="Collapse cart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="18" height="18"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
        <div id="rfq-cart-items" class="rfq-cart-items"></div>
        <div class="rfq-cart-footer">
          <button type="button" id="rfq-cart-clear" class="rfq-cart-clear">Clear All</button>
          <button type="button" id="rfq-cart-checkout" class="rfq-cart-checkout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
            <span id="rfq-cart-checkout-label">Submit RFQ (0)</span>
          </button>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js?v=118"></script>
</body>
</html>
